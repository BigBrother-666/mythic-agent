# MythicMobs Agent 一键部署：
#   docker compose up -d
#   docker compose exec fastapi python -m scripts.ingest --drop
# 服务：fastapi + milvus standalone (含 etcd、minio) + redis

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: >
      etcd
      -advertise-client-urls=http://etcd:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    image: milvusdb/milvus:v2.4.13
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  fastapi:
    build:
      context: .
      dockerfile: docker/fastapi/Dockerfile
      args:
        # CPU 默认；切 GPU 用 docker-compose.cuda.yml override（见 README）
        TORCH_INDEX_URL: ${TORCH_INDEX_URL:-https://download.pytorch.org/whl/cpu}
    env_file:
      - .env
    environment:
      MILVUS_HOST: milvus
      REDIS_URL: redis://redis:6379/0
      WIKI_ROOT: /wiki
    ports:
      - "8000:8000"
    volumes:
      - ./wiki:/wiki:ro
      - ./examples:/examples:ro
      - hf_cache:/home/app/.cache/huggingface
    depends_on:
      milvus:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  etcd_data:
  minio_data:
  milvus_data:
  redis_data:
  hf_cache:
